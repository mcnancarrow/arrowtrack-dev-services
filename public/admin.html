<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arrowtrack Forge — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #7C3AED; --accent: #22C55E; --dark: #0D0D0D; --dark2: #1A1A1A; --dark3: #252525; --white: #fff; --gray: #888; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px; background: var(--dark2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { font-size: 17px; font-weight: 800; }
    .logo span:first-child { color: var(--brand); }
    .admin-badge { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); padding: 4px 12px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.06em; }
    .logout-btn { font-size: 12px; font-weight: 600; color: var(--gray); background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    .layout { display: flex; height: calc(100vh - 61px); }

    /* SIDEBAR */
    .sidebar { width: 360px; min-width: 360px; border-right: 1px solid rgba(255,255,255,0.06); overflow-y: auto; }
    .sidebar-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: flex-end; }
    .sidebar-title { font-size: 13px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .submission-count { font-size: 28px; font-weight: 800; color: var(--white); }
    .pipeline-total { text-align: right; }
    .pipeline-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .pipeline-value { font-size: 22px; font-weight: 800; color: var(--accent); }

    .submission-item {
      padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: background 0.15s;
    }
    .submission-item:hover { background: rgba(255,255,255,0.03); }
    .submission-item.active { background: rgba(124,58,237,0.1); border-left: 3px solid var(--brand); }
    .sub-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; display: flex; justify-content: space-between; gap: 8px; }
    .sub-quote { color: var(--accent); font-weight: 800; font-size: 13px; white-space: nowrap; }
    .sub-company { font-size: 12px; color: var(--gray); margin-bottom: 6px; }
    .sub-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sub-ref { font-size: 11px; color: #555; font-family: monospace; }
    .sub-date { font-size: 11px; color: #555; }
    .status-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 8px; border-radius: 100px;
    }
    .status-new { background: rgba(34,197,94,0.15); color: var(--accent); }
    .status-reviewing { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .status-active { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status-approved { background: rgba(34,197,94,0.18); color: #4ade80; }
    .status-complete { background: rgba(255,255,255,0.08); color: #888; }

    /* DETAIL */
    .detail { flex: 1; overflow-y: auto; padding: 32px 40px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray); text-align: center; }
    .empty-state div:first-child { font-size: 48px; margin-bottom: 16px; }

    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .detail-title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .detail-sub { font-size: 14px; color: var(--gray); }
    .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .action-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-reviewing { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .btn-active { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .btn-complete { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }
    .btn-delete { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-approve { background: linear-gradient(135deg,#7C3AED,#22C55E); color: #fff; border: none; font-weight: 700; }

    /* QUOTE BANNER */
    .quote-banner { display: flex; gap: 32px; align-items: center; background: linear-gradient(160deg, rgba(124,58,237,0.12), rgba(34,197,94,0.06)); border: 1px solid rgba(124,58,237,0.35); border-radius: 12px; padding: 20px 28px; margin-bottom: 28px; }
    .quote-banner .qb-block { display: flex; flex-direction: column; }
    .quote-banner .qb-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .quote-banner .qb-total { font-size: 26px; font-weight: 800; color: var(--accent); }
    .quote-banner .qb-deposit { font-size: 22px; font-weight: 800; color: var(--brand); }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 20px; }
    .detail-card-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
    .detail-row { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { font-size: 12px; color: var(--gray); min-width: 110px; }
    .detail-val { font-size: 13px; color: var(--white); font-weight: 500; word-break: break-word; }

    .detail-full { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .detail-full-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .detail-full p { font-size: 14px; color: #ccc; line-height: 1.7; white-space: pre-wrap; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { font-size: 12px; font-weight: 600; background: rgba(124,58,237,0.12); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); padding: 3px 10px; border-radius: 100px; }
    .tag-green { background: rgba(34,197,94,0.1); color: var(--accent); border-color: rgba(34,197,94,0.2); }

    .loading { text-align: center; padding: 40px; color: var(--gray); }

    /* DEPLOY SECTION */
    .deploy-section { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .deploy-section-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .deploy-screenshot { width: 280px; height: 175px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
    .deploy-screenshot-placeholder { width: 280px; height: 120px; background: var(--dark3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; color: #444; font-size: 13px; flex-shrink: 0; }
    .deploy-links { display: flex; flex-direction: column; gap: 10px; }
    .deploy-link { font-size: 14px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
    .deploy-link:hover { opacity: 0.8; }
    .deploy-link-live { color: var(--accent); }
    .deploy-link-repo { color: #a78bfa; }
    .deploy-note { font-size: 12px; color: var(--gray); margin-top: 6px; }
    .deploy-error { font-size: 12px; color: #fca5a5; margin-top: 4px; }
    .status-deploying { background: rgba(251,191,36,0.15); color: #fcd34d; }
    .status-failed { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .status-no-files { background: rgba(255,255,255,0.07); color: #666; }
    .sidebar-deploy-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; margin-left: 4px; vertical-align: middle; }
    .sidebar-deploy-dot.deploying { background: #fcd34d; animation: pulse-dot 1.4s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* PENDING REVIEW */
    .status-pending_review { background: rgba(251,191,36,0.15); color: #fcd34d; }
    .review-panel { background: linear-gradient(160deg,rgba(251,191,36,0.06),rgba(124,58,237,0.06)); border: 1px solid rgba(251,191,36,0.25); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
    .review-panel-title { font-size: 11px; font-weight: 700; color: #fcd34d; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .step-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; color: #aaa; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .step-btn:hover { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: #fff; }
    .step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .step-btn.running { background: rgba(124,58,237,0.2); border-color: var(--brand); color: #a78bfa; }

    /* FILE EDITOR */
    .file-editor { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .file-editor-header { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .file-editor-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
    .file-tabs { display: flex; gap: 2px; background: var(--dark3); border-radius: 8px; padding: 3px; }
    .file-tab { background: none; border: none; border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: #555; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }
    .file-tab.active { background: var(--dark2); color: #fff; }
    .file-textarea { width: 100%; height: 380px; background: #080808; border: none; border-top: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.7; padding: 16px 20px; resize: vertical; outline: none; tab-size: 2; }
    .file-editor-footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<header>
  <div class="logo"><span>Arrowtrack</span><span> Forge</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="admin-badge">Forge Admin</div>
    <button class="logout-btn" onclick="adminLogout()">Log Out</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title">Submissions</div>
        <div class="submission-count" id="subCount">—</div>
      </div>
      <div class="pipeline-total">
        <div class="pipeline-label">Pipeline</div>
        <div class="pipeline-value" id="pipelineValue">$0</div>
      </div>
    </div>
    <div id="subList"><div class="loading">Loading...</div></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty-state">
      <div>📋</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Select a submission</div>
      <div style="font-size:14px;">Click any item on the left to view details</div>
    </div>
  </div>
</div>

<script>
  let submissions = [];
  let activeId = null;
  const money = n => '$' + (Number(n) || 0).toLocaleString();

  async function adminLogout() {
    // Send a request with intentionally wrong credentials — browser drops the cached Basic Auth creds.
    try { await fetch('/admin/logout', { headers: { 'Authorization': 'Basic ' + btoa('logout:logout') } }); } catch(e) {}
    window.location.href = '/';
  }

  async function loadSubmissions() {
    const res = await fetch('/admin/api/submissions');
    submissions = await res.json();
    document.getElementById('subCount').textContent = submissions.length;
    const pipeline = submissions.reduce((sum, s) => sum + (Number(s.quote_total) || 0), 0);
    document.getElementById('pipelineValue').textContent = money(pipeline);
    const list = document.getElementById('subList');
    if (!submissions.length) {
      list.innerHTML = '<div class="loading">No submissions yet.</div>';
      return;
    }
    list.innerHTML = submissions.map(s => `
      <div class="submission-item ${s.id === activeId ? 'active' : ''}" onclick="loadDetail(${s.id})">
        <div class="sub-name"><span>${s.client_name || 'Unknown'}</span>${s.quote_total ? `<span class="sub-quote">${money(s.quote_total)}</span>` : ''}</div>
        <div class="sub-company">${s.project_name || '—'} · ${s.company_name || '—'}</div>
        <div class="sub-meta">
          <span class="status-badge status-${s.status}">${s.status}</span>
          ${s.deploy_status === 'ready' ? '<span class="sidebar-deploy-dot" title="Live app deployed"></span>' : s.deploy_status === 'deploying' ? '<span class="sidebar-deploy-dot deploying" title="Deploying…"></span>' : ''}
          <span class="sub-ref">${s.ref_code}</span>
          <span class="sub-date">${new Date(s.created_at).toLocaleDateString()}</span>
        </div>
      </div>
    `).join('');
  }

  async function loadDetail(id) {
    activeId = id;
    document.querySelectorAll('.submission-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.submission-item[onclick="loadDetail(${id})"]`)?.classList.add('active');

    const res = await fetch(`/admin/api/submissions/${id}`);
    const s = await res.json();
    const d = s.data || {};

    const platforms = [d.platform_web && 'Web', d.platform_ios && 'iOS', d.platform_android && 'Android'].filter(Boolean);
    const deliverables = [d.del_admin&&'Admin Panel',d.del_payments&&'Payments',d.del_ai&&'AI',d.del_push&&'Push Notifications',d.del_email&&'Email',d.del_maps&&'Maps',d.del_analytics&&'Analytics',d.del_cms&&'CMS'].filter(Boolean);
    const features = [d.feat_auth&&'Email Auth',d.feat_oauth&&'Google/Apple OAuth',d.feat_roles&&'User Roles',d.feat_magic&&'Magic Link',d.feat_stripe&&'Stripe',d.feat_subscriptions&&'Subscriptions',d.feat_freemium&&'Freemium',d.feat_iap&&'IAP',d.feat_ai_content&&'AI Content',d.feat_ai_chat&&'AI Chat',d.feat_ai_analysis&&'AI Analysis',d.feat_automation&&'Automation'].filter(Boolean);
    const screens = d.screens_list || [];
    const total = d.quote_total ?? s.quote_total;
    const deposit = d.quote_deposit ?? (total ? Math.round(total * 0.5) : 0);

    // ── Pre-build review panel + file editor strings (must NOT go inside the
    //    template literal — file content would escape backticks / ${} sequences)
    const stepBtns = [1,2,3,4,5,7].map(function(n) {
      var labels = {1:'① Foundation',2:'② Platforms',3:'③ Features',4:'④ Screens',5:'⑤ Design',7:'⑦ Content'};
      return '<button class="step-btn" onclick="regenerateStep(' + id + ',' + n + ',this)">' + labels[n] + '</button>';
    }).join('');
    const hasFiles = !!(s.generated_files && Object.keys(s.generated_files).length > 0);
    const reviewPanelHtml = s.status === 'pending_review' ? (
      '<div class="review-panel">' +
        '<div class="review-panel-title">⚡ Human Review — AI Build Ready</div>' +
        '<p style="font-size:13px;color:#ccc;line-height:1.7;margin-bottom:14px;">The AI has generated this project. Review and tweak the files below, then redeploy and approve when satisfied.</p>' +
        '<div style="margin-bottom:14px;">' +
          '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Re-generate individual AI steps</div>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;">' + stepBtns + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">' +
          '<button class="action-btn btn-active" style="font-size:13px;" onclick="redeployApp(' + id + ')">🚀 Redeploy Updated App</button>' +
          '<button class="action-btn btn-approve" onclick="sendPaymentLink(' + id + ')">✓ Approve &amp; Send Payment Link</button>' +
        '</div>' +
      '</div>'
    ) : '';
    const fileEditorHtml = hasFiles ? (function() {
      var fileKeys = Object.keys(s.generated_files);
      var tabs = fileKeys.map(function(name, i) {
        return '<button class="file-tab' + (i === 0 ? ' active' : '') + '" onclick="switchFileTab(' + id + ',\'' + name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',this)">' + name + '</button>';
      }).join('');
      return '<div class="file-editor">' +
        '<div class="file-editor-header">' +
          '<div class="file-editor-title">Generated Files (' + fileKeys.length + ')</div>' +
          '<div class="file-tabs" id="fileTabs-' + id + '">' + tabs + '</div>' +
        '</div>' +
        '<textarea class="file-textarea" id="fileArea-' + id + '" spellcheck="false"></textarea>' +
        '<div class="file-editor-footer">' +
          '<button class="action-btn btn-reviewing" onclick="saveFiles(' + id + ')">💾 Save Changes</button>' +
          '<span style="font-size:12px;color:#555;" id="saveStatus-' + id + '"></span>' +
        '</div>' +
      '</div>';
    })() : '';

    document.getElementById('detail').innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-title">${d.project_name || 'Untitled Project'}</div>
          <div class="detail-sub">${s.client_name} · ${s.client_email} · <span style="color:#a78bfa;font-family:monospace;">${s.ref_code}</span></div>
        </div>
        <div class="detail-actions">
          <button class="action-btn btn-approve" onclick="sendPaymentLink(${id})">Approve &amp; Send Payment Link</button>
          <button class="action-btn btn-reviewing" onclick="updateStatus(${id},'reviewing')">Mark Reviewing</button>
          <button class="action-btn btn-active" onclick="updateStatus(${id},'active')">Mark Active</button>
          <button class="action-btn btn-complete" onclick="updateStatus(${id},'complete')">Complete</button>
          <button class="action-btn btn-delete" onclick="deleteSubmission(${id}, '${(s.project_name || 'this lead').replace(/'/g, "\\'")}')">Delete</button>
        </div>
      </div>

      ${total ? `<div class="quote-banner">
        <div class="qb-block"><span class="qb-label">Estimated Quote</span><span class="qb-total">${money(total)}</span></div>
        <div class="qb-block"><span class="qb-label">50% Deposit</span><span class="qb-deposit">${money(deposit)}</span></div>
        ${d.care_plan ? `<div class="qb-block"><span class="qb-label">Care Plan</span><span class="qb-deposit" style="color:var(--accent);">$199/mo</span></div>` : ''}
        <div class="qb-block"><span class="qb-label">Package</span><span style="font-size:15px;font-weight:700;color:#fff;">${d.package || '—'}</span></div>
      </div>` : ''}

      ${reviewPanelHtml}

      ${s.deploy_status ? (() => {
        const statusClass =
          s.deploy_status === 'ready'     ? 'status-active' :
          s.deploy_status === 'deploying'  ? 'status-deploying' :
          s.deploy_status === 'failed'     ? 'status-failed' :
          'status-no-files';
        const statusLabel =
          s.deploy_status === 'ready'     ? '🟢 Live' :
          s.deploy_status === 'deploying'  ? '🟡 Deploying…' :
          s.deploy_status === 'failed'     ? '🔴 Failed' :
          s.deploy_status;

        const domainBadge =
          s.domain_status === 'active'      ? '<span class="status-badge status-active" style="margin-left:8px;">✓ Domain Active</span>' :
          s.domain_status === 'pending_dns' ? '<span class="status-badge status-deploying" style="margin-left:8px;">⏳ Pending DNS</span>' : '';

        const dnsTable = (s.domain_dns_records && s.domain_dns_records.length) ? `
          <div style="margin-top:14px;">
            <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">DNS Records — add at your domain registrar</div>
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead><tr style="color:#555;">
                <td style="padding:4px 10px 4px 0;">Type</td>
                <td style="padding:4px 10px 4px 0;">Host</td>
                <td style="padding:4px 10px 4px 0;">Value</td>
                <td style="padding:4px 0;">TTL</td>
              </tr></thead>
              <tbody>
                ${s.domain_dns_records.map(r => `<tr style="border-top:1px solid rgba(255,255,255,0.05);">
                  <td style="padding:6px 10px 6px 0;color:#a78bfa;font-weight:700;">${r.type}</td>
                  <td style="padding:6px 10px 6px 0;color:#fff;font-family:monospace;">${r.host}</td>
                  <td style="padding:6px 10px 6px 0;color:#22C55E;font-family:monospace;word-break:break-all;">${r.value}</td>
                  <td style="padding:6px 0;color:#888;">${r.ttl}</td>
                </tr>`).join('')}
              </tbody>
            </table>
            ${s.domain_status === 'pending_dns' ? `<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <span style="font-size:12px;color:#888;">Once DNS propagates (usually 5–60 min), mark it active:</span>
              <button class="action-btn btn-active" style="padding:5px 12px;font-size:12px;" onclick="markDomainActive(${s.id})">Mark Domain Active ✓</button>
            </div>` : ''}
          </div>` : '';

        const domainAssignSection = s.deploy_status === 'ready' ? `
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);">
            <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">
              ${s.custom_domain ? `Custom Domain — <span style="color:#fff;font-family:monospace;">${s.custom_domain}</span>${domainBadge}` : 'Assign Custom Domain'}
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <input id="domainInput-${s.id}" type="text" value="${s.custom_domain || d.custom_domain || ''}"
                placeholder="e.g. www.clientsite.com or app.clientbrand.com"
                style="flex:1;min-width:220px;background:#0d0d0d;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none;"
                onkeydown="if(event.key==='Enter')assignDomain(${s.id})"/>
              <button class="action-btn btn-approve" style="padding:9px 16px;" onclick="assignDomain(${s.id})">Assign Domain →</button>
            </div>
            <div id="domainResult-${s.id}" style="margin-top:10px;"></div>
            ${dnsTable}
          </div>` : '';

        return `<div class="deploy-section">
          <div class="deploy-section-title">
            Live App
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
            ${s.screenshot_url
              ? `<img class="deploy-screenshot" src="${s.screenshot_url}" alt="App preview" onerror="this.style.display='none'">`
              : s.deploy_status === 'ready'
                ? `<div class="deploy-screenshot-placeholder">Screenshot pending</div>`
                : ''}
            <div class="deploy-links">
              ${s.deploy_url ? `<a class="deploy-link deploy-link-live" href="${s.deploy_url}" target="_blank">🌐 Open Netlify Preview →</a>` : ''}
              ${s.custom_domain && s.domain_status === 'active' ? `<a class="deploy-link deploy-link-live" href="https://${s.custom_domain}" target="_blank" style="color:#4ade80;">✓ ${s.custom_domain} →</a>` : ''}
              ${s.repo_url   ? `<a class="deploy-link deploy-link-repo" href="${s.repo_url}" target="_blank">📦 View GitHub Repo →</a>` : ''}
              ${!s.deploy_url && s.deploy_status === 'deploying' ? `<div class="deploy-note">Deploying now — refresh in ~60 seconds</div>` : ''}
              ${s.deploy_status === 'no_files' ? `<div class="deploy-note">No generated files found for this submission.</div>` : ''}
              ${s.deploy_status === 'failed'   ? `<div class="deploy-error">Deploy failed${s.deploy_error ? ': ' + s.deploy_error : ''}.</div>` : ''}
            </div>
          </div>
          ${domainAssignSection}
        </div>`;
      })() : ''}

      ${fileEditorHtml}

      <div class="detail-grid">
        <div class="detail-card">
          <div class="detail-card-title">Client</div>
          <div class="detail-row"><div class="detail-key">Name</div><div class="detail-val">${s.client_name || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Email</div><div class="detail-val"><a href="mailto:${s.client_email}" style="color:#22C55E;">${s.client_email || '—'}</a></div></div>
          <div class="detail-row"><div class="detail-key">Phone</div><div class="detail-val">${d.phone || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Company</div><div class="detail-val">${s.company_name || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Industry</div><div class="detail-val">${d.business_type || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Referral</div><div class="detail-val">${d.referral || '—'}</div></div>
        </div>
        <div class="detail-card">
          <div class="detail-card-title">Project</div>
          <div class="detail-row"><div class="detail-key">Package</div><div class="detail-val" style="color:#7C3AED;font-weight:700;">${d.package || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Care Plan</div><div class="detail-val" style="${d.care_plan ? 'color:#22C55E;font-weight:700;' : ''}">${d.care_plan ? 'Yes — $199/mo' : 'No'}</div></div>
          <div class="detail-row"><div class="detail-key">Budget</div><div class="detail-val">${d.budget || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Urgency</div><div class="detail-val">${d.urgency || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Start Date</div><div class="detail-val">${d.start_date || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Launch Date</div><div class="detail-val">${d.target_launch || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Submitted</div><div class="detail-val">${new Date(s.created_at).toLocaleString()}</div></div>
        </div>
      </div>

      <div class="detail-full">
        <div class="detail-full-title">Platforms & Deliverables</div>
        <div class="tag-list">
          ${platforms.map(p=>`<span class="tag tag-green">${p}</span>`).join('')}
          ${deliverables.map(x=>`<span class="tag">${x}</span>`).join('')}
          ${(!platforms.length && !deliverables.length) ? '<span style="color:#555;font-size:13px;">None selected</span>' : ''}
        </div>
      </div>

      <div class="detail-full">
        <div class="detail-full-title">Features (${features.length})</div>
        <div class="tag-list">
          ${features.map(f=>`<span class="tag">${f}</span>`).join('')}
          ${!features.length ? '<span style="color:#555;font-size:13px;">None selected</span>' : ''}
        </div>
      </div>

      <div class="detail-full">
        <div class="detail-full-title">Screens (${screens.length})</div>
        <div class="tag-list">
          ${screens.map(sc=>`<span class="tag tag-green">${sc}</span>`).join('')}
          ${!screens.length ? '<span style="color:#555;font-size:13px;">None listed</span>' : ''}
        </div>
      </div>

      <div class="detail-grid">
        <div class="detail-card">
          <div class="detail-card-title">Design</div>
          <div class="detail-row"><div class="detail-key">Color Mode</div><div class="detail-val">${d.color_mode || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Primary Color</div><div class="detail-val"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${d.color_primary||'#fff'};margin-right:6px;vertical-align:middle;"></span>${d.color_primary || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Accent Color</div><div class="detail-val"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${d.color_secondary||'#fff'};margin-right:6px;vertical-align:middle;"></span>${d.color_secondary || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Font Style</div><div class="detail-val">${d.font_style || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Brand Assets</div><div class="detail-val">${d.brand_assets || '—'}</div></div>
          <div class="detail-row"><div class="detail-key">Reference</div><div class="detail-val">${d.design_reference || '—'}</div></div>
        </div>
        <div class="detail-card">
          <div class="detail-card-title">Business Goal</div>
          <p style="font-size:13px;color:#ccc;line-height:1.7;">${d.business_goal || '—'}</p>
          ${d.target_users ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);"><div style="font-size:11px;color:#888;margin-bottom:6px;">TARGET USERS</div><p style="font-size:13px;color:#ccc;">${d.target_users}</p></div>` : ''}
        </div>
      </div>

      ${d.custom_features ? `<div class="detail-full"><div class="detail-full-title">Custom Features</div><p>${d.custom_features}</p></div>` : ''}
      ${d.design_notes ? `<div class="detail-full"><div class="detail-full-title">Design Notes</div><p>${d.design_notes}</p></div>` : ''}
      ${d.additional_notes ? `<div class="detail-full"><div class="detail-full-title">Timeline Notes</div><p>${d.additional_notes}</p></div>` : ''}
      ${d.final_notes ? `<div class="detail-full"><div class="detail-full-title">Additional Notes</div><p>${d.final_notes}</p></div>` : ''}
    `;
    // Populate file editor AFTER innerHTML is set — textarea.value bypasses template-literal escaping
    if (hasFiles) populateFileEditor(id, s.generated_files);
  }

  async function updateStatus(id, status) {
    await fetch(`/admin/api/submissions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadSubmissions();
    loadDetail(id);
  }

  async function sendPaymentLink(id) {
    if (!confirm('Approve this brief and email the client a payment link for their 50% deposit?')) return;
    const res = await fetch(`/admin/api/submissions/${id}/send-payment-link`, { method: 'POST' });
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) { alert(data.error || 'Could not send payment link.'); return; }
    const depositTxt = data.deposit ? `$${data.deposit.toLocaleString()}` : 'the deposit';
    alert(`Status set to Approved.\n\n${data.emailSent ? '✅ Payment link emailed to the client' : '⚠️ Email not sent (check RESEND_API_KEY)'} for ${depositTxt}.\n\nThey can also pay from the portal: ${data.portalUrl || '/project'}`);
    loadSubmissions();
    loadDetail(id);
  }

  async function deleteSubmission(id, name) {
    if (!confirm(`Delete "${name}"?\n\nThis permanently removes the lead and its customer login. This cannot be undone.`)) return;
    const res = await fetch(`/admin/api/submissions/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert('Delete failed.'); return; }
    document.getElementById('detail').innerHTML = '<div class="empty-state"><div>🗑️</div><div style="font-size:14px;">Lead deleted. Select another item on the left.</div></div>';
    loadSubmissions();
  }

  async function assignDomain(id) {
    const input = document.getElementById(`domainInput-${id}`);
    const resultEl = document.getElementById(`domainResult-${id}`);
    const domain = input ? input.value.trim() : '';
    if (!domain) { resultEl.innerHTML = '<div class="deploy-error">Enter a domain first.</div>'; return; }
    input.disabled = true;
    resultEl.innerHTML = '<div class="deploy-note">Assigning domain on Netlify…</div>';
    try {
      const res = await fetch(`/admin/api/submissions/${id}/assign-domain`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ domain }),
      });
      const data = await res.json();
      if (!res.ok) {
        resultEl.innerHTML = `<div class="deploy-error">${data.error || 'Failed.'}</div>`;
        input.disabled = false; return;
      }
      resultEl.innerHTML = `<div class="deploy-note" style="color:#4ade80;">✓ Domain assigned! DNS records generated — scroll down to see them.</div>`;
      setTimeout(() => { loadDetail(id); loadSubmissions(); }, 800);
    } catch (err) {
      resultEl.innerHTML = `<div class="deploy-error">Network error. Try again.</div>`;
      input.disabled = false;
    }
  }

  async function markDomainActive(id) {
    await fetch(`/admin/api/submissions/${id}/domain-active`, { method: 'POST' });
    loadDetail(id);
    loadSubmissions();
  }

  // ── File editor helpers ──────────────────────────────────────────────────
  function populateFileEditor(id, files) {
    window._forgeFiles = window._forgeFiles || {};
    window._forgeFiles[id] = Object.assign({}, files);
    var fileKeys = Object.keys(files);
    if (!fileKeys.length) return;
    var area = document.getElementById('fileArea-' + id);
    if (!area) return;
    // Try to keep the currently-active tab; fall back to first file.
    var activeTab = document.querySelector('#fileTabs-' + id + ' .file-tab.active');
    var keyToShow = (activeTab && files[activeTab.textContent] !== undefined) ? activeTab.textContent : fileKeys[0];
    area.value = files[keyToShow] || '';
  }

  function switchFileTab(id, tab, btn) {
    var area = document.getElementById('fileArea-' + id);
    if (!area) return;
    // Persist current textarea value back into the in-memory store before switching.
    var activeTab = document.querySelector('#fileTabs-' + id + ' .file-tab.active');
    if (activeTab && window._forgeFiles && window._forgeFiles[id]) {
      window._forgeFiles[id][activeTab.textContent] = area.value;
    }
    document.querySelectorAll('#fileTabs-' + id + ' .file-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    area.value = (window._forgeFiles && window._forgeFiles[id] && window._forgeFiles[id][tab]) || '';
  }

  async function regenerateStep(id, step, btn) {
    btn.disabled = true;
    btn.classList.add('running');
    var origText = btn.textContent;
    btn.textContent = '⏳ Running…';
    try {
      var res = await fetch('/admin/api/submissions/' + id + '/regenerate-step', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ step: step })
      });
      var data = await res.json();
      if (!res.ok) { alert(data.error || 'Regeneration failed.'); return; }
      if (data.files) {
        window._forgeFiles = window._forgeFiles || {};
        // Merge new files into the existing set (step may only update some files).
        window._forgeFiles[id] = Object.assign(window._forgeFiles[id] || {}, data.files);
        populateFileEditor(id, window._forgeFiles[id]);
      }
    } catch (err) {
      alert('Network error: ' + err.message);
    } finally {
      btn.textContent = origText;
      btn.disabled = false;
      btn.classList.remove('running');
    }
  }

  async function saveFiles(id) {
    var area = document.getElementById('fileArea-' + id);
    var statusEl = document.getElementById('saveStatus-' + id);
    // Flush textarea into the in-memory store first.
    var activeTab = document.querySelector('#fileTabs-' + id + ' .file-tab.active');
    if (area && activeTab && window._forgeFiles && window._forgeFiles[id]) {
      window._forgeFiles[id][activeTab.textContent] = area.value;
    }
    var files = (window._forgeFiles && window._forgeFiles[id]) || {};
    if (statusEl) statusEl.textContent = 'Saving…';
    try {
      var res = await fetch('/admin/api/submissions/' + id + '/save-files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: files })
      });
      if (!res.ok) { if (statusEl) statusEl.textContent = '✗ Save failed'; return; }
      if (statusEl) {
        statusEl.textContent = '✓ Saved';
        setTimeout(function() { if (statusEl) statusEl.textContent = ''; }, 3000);
      }
    } catch (err) {
      if (statusEl) statusEl.textContent = '✗ Network error';
    }
  }

  async function redeployApp(id) {
    if (!confirm('Save current files and redeploy to Netlify?\n\nThe live preview URL will update in ~60–90 seconds.')) return;
    // Persist any unsaved edits to the server before redeploying.
    await saveFiles(id);
    var res = await fetch('/admin/api/submissions/' + id + '/redeploy', { method: 'POST' });
    var data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) { alert(data.error || 'Redeploy request failed.'); return; }
    alert('🚀 Redeploy started!\n\nThe sidebar will show a pulsing yellow dot while deploying. This panel will auto-refresh in ~95 seconds.');
    loadSubmissions(); // show deploying dot immediately
    setTimeout(function() { loadDetail(id); loadSubmissions(); }, 95000);
  }

  loadSubmissions();
</script>
</body>
</html>
