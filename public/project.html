<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arrowtrack Forge — My Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 100'%3E%3Cpath fill='%235A6573' stroke='%230E1116' stroke-width='2' stroke-linejoin='round' d='M10 50 L37 42 L105 42 L105 55 L88 55 C84 62 79 65 74 69 L74 75 L97 75 L97 88 L25 88 L25 75 L50 75 L50 69 C45 65 40 62 35 55 Z'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #3B82F6; --brand-dark: #2563EB; --accent: #60A5FA; --dark: #16191F; --dark2: #22272E; --dark3: #2A3038; --gray: #9AA3AF; --white: #E6E9ED; }
    body { font-family: 'Inter', sans-serif; color: var(--white); min-height: 100vh;
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(59,130,246,.10), transparent 60%),
        linear-gradient(180deg,#1B1F26 0%,var(--dark) 45%,#0F1217 100%);
      background-attachment: fixed; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 40px; border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; background: rgba(22,25,31,.72); backdrop-filter: blur(8px); z-index: 50; }
    .logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .logo svg { display: block; }
    .logo .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo .logo-eyebrow { font: 600 9px/1 'Inter', sans-serif; letter-spacing: .28em; color: var(--gray); text-transform: uppercase; margin-bottom: 4px; }
    .logo .logo-word { font: 800 21px/1 'Saira Condensed', 'Inter', sans-serif; letter-spacing: .04em; color: var(--brand); text-transform: uppercase; }
    .logo span:first-child { color: var(--brand); }
    .logo span:last-child { color: var(--white); }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .greeting { font-size: 14px; color: var(--gray); }
    .greeting b { color: #fff; }
    .logout { font-size: 13px; color: var(--gray); background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-weight: 600; transition: background 0.2s; }
    .logout:hover { background: rgba(255,255,255,0.06); }

    main { max-width: 880px; margin: 0 auto; padding: 48px 24px 80px; }
    .page-title { font-size: clamp(26px, 4vw, 34px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .page-title span { color: var(--brand); }
    .page-sub { font-size: 15px; color: var(--gray); margin-bottom: 36px; }

    .loading, .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty a { color: var(--accent); font-weight: 600; text-decoration: none; }

    .project { background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
    .project-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .project-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .project-ref { font-size: 12px; color: #666; font-family: monospace; }
    .status-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 5px 12px; border-radius: 100px; white-space: nowrap; }
    .status-new { background: rgba(59,130,246,0.15); color: var(--accent); }
    .status-reviewing { background: rgba(59,130,246,0.15); color: #93B8FF; }
    .status-approved { background: rgba(59,130,246,0.18); color: #7DACFF; }
    .status-active { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status-complete { background: rgba(59,130,246,0.2); color: var(--accent); }

    /* TIMELINE */
    .timeline { display: flex; margin: 8px 0 28px; }
    .tl-step { flex: 1; text-align: center; position: relative; }
    .tl-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--dark3); border: 2px solid rgba(255,255,255,0.15); margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; position: relative; z-index: 2; }
    .tl-step.done .tl-dot { background: var(--brand); border-color: var(--brand); color: #fff; }
    .tl-step.current .tl-dot { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 0 4px rgba(59,130,246,0.2); }
    .tl-line { position: absolute; top: 13px; left: -50%; width: 100%; height: 2px; background: rgba(255,255,255,0.12); z-index: 1; }
    .tl-step.done .tl-line, .tl-step.current .tl-line { background: var(--brand); }
    .tl-step:first-child .tl-line { display: none; }
    .tl-label { font-size: 12px; font-weight: 600; color: #888; }
    .tl-step.done .tl-label, .tl-step.current .tl-label { color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 8px; }
    .panel { background: var(--dark); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; }
    .panel-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
    .qrow { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .qrow:last-child { border-bottom: none; }
    .qrow .k { color: var(--gray); flex-shrink: 0; }
    .qrow .v { color: #fff; font-weight: 600; min-width: 0; text-align: right; overflow-wrap: anywhere; }
    .qrow.total { font-size: 16px; font-weight: 800; padding-top: 12px; }
    .qrow.total .v { color: var(--accent); }
    .paid-pill { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(59,130,246,0.12); padding: 2px 8px; border-radius: 100px; }
    .due-pill { font-size: 11px; font-weight: 700; color: #fbbf24; background: rgba(251,191,36,0.12); padding: 2px 8px; border-radius: 100px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; font-weight: 600; background: rgba(59,130,246,0.12); color: #93B8FF; border: 1px solid rgba(59,130,246,0.2); padding: 3px 10px; border-radius: 100px; }
    .tag-green { background: rgba(59,130,246,0.1); color: var(--accent); border-color: rgba(59,130,246,0.2); }

    .balance-bar { margin-top: 20px; padding: 18px 20px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    .balance-info .bl { font-size: 12px; color: var(--gray); margin-bottom: 2px; }
    .balance-info .bv { font-size: 20px; font-weight: 800; color: #fff; }
    .btn-pay { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
    .btn-pay:hover { opacity: 0.9; }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-note { font-size: 13px; color: var(--accent); margin-top: 12px; line-height: 1.5; }
    .banner { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: var(--accent); border-radius: 12px; padding: 16px 20px; margin-bottom: 28px; font-size: 14px; font-weight: 600; }

    /* PREVIEW PANEL (3 states: ready / building / pending) */
    .preview-panel { border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; overflow: hidden; }
    .preview-panel.ready { background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(59,130,246,0.06)); border: 1px solid rgba(59,130,246,0.3); }
    .preview-panel.building { background: rgba(251,191,36,0.05); border: 1px solid rgba(251,191,36,0.2); }
    .preview-panel.pending { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); }
    .preview-panel-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .preview-panel.building .preview-panel-title { color: #fbbf24; }
    .preview-panel.pending  .preview-panel-title { color: #666; }

    /* Screenshot */
    .preview-shot-wrap { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #111; margin-bottom: 14px; cursor: pointer; }
    .preview-shot { width: 100%; display: block; max-height: 360px; object-fit: cover; object-position: top; transition: transform 0.35s; }
    .preview-shot-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.25s; }
    .preview-shot-wrap:hover .preview-shot { transform: scale(1.015); }
    .preview-shot-wrap:hover .preview-shot-overlay { background: rgba(0,0,0,0.45); opacity: 1; }
    .preview-open-btn { background: var(--accent); color: #000; border-radius: 10px; padding: 12px 26px; font-size: 14px; font-weight: 800; text-decoration: none; }
    .preview-url-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }

    /* Building dots */
    .building-body { display: flex; align-items: center; gap: 18px; padding: 8px 0 4px; }
    .building-dots { display: flex; gap: 7px; flex-shrink: 0; }
    .building-dots span { width: 9px; height: 9px; border-radius: 50%; background: #fbbf24; animation: pdot 1.4s ease-in-out infinite; }
    .building-dots span:nth-child(2) { animation-delay: 0.22s; }
    .building-dots span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes pdot { 0%,80%,100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
    .building-text { font-size: 15px; font-weight: 700; color: #fbbf24; }
    .building-sub { font-size: 13px; color: #888; margin-top: 5px; line-height: 1.4; }

    /* Pending */
    .pending-body { display: flex; align-items: flex-start; gap: 16px; padding: 6px 0 2px; }
    .pending-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .pending-text { font-size: 15px; font-weight: 700; color: #bbb; margin-bottom: 6px; }
    .pending-sub { font-size: 13px; color: #666; line-height: 1.5; }

    /* Page tabs */
    .preview-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .preview-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .preview-tab:hover { background: rgba(255,255,255,0.09); color: #ccc; }
    .preview-tab.active { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); color: #BFD4FF; }
    .preview-frame-wrap { border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #fff; margin-bottom: 14px; position: relative; }
    .preview-iframe { width: 100%; height: 500px; border: none; display: block; }
    .preview-frame-loading { position: absolute; inset: 0; background: rgba(13,13,13,0.7); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #888; font-weight: 600; pointer-events: none; transition: opacity 0.3s; }
    .preview-frame-loading.hidden { opacity: 0; }
    .preview-note { font-size: 12px; color: #666; margin-bottom: 12px; line-height: 1.5; }

    /* Live btn */
    .live-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 11px 22px; font-size: 14px; font-weight: 800; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
    .live-btn:hover { opacity: 0.88; }

    /* Self-serve rebuild */
    .rebuild-bar { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.07); display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px; }
    .rebuild-btn { background: transparent; color: var(--brand, #93B8FF); border: 1px solid rgba(59,130,246,0.45); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 800; cursor: pointer; transition: background 0.2s, opacity 0.2s; }
    .rebuild-btn:hover:not(:disabled) { background: rgba(59,130,246,0.12); }
    .rebuild-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .rebuild-hint { font-size: 12px; color: #777; line-height: 1.4; flex: 1 1 200px; }
    .rebuild-err { font-size: 12px; color: #f87171; font-weight: 600; width: 100%; }

    /* DNS */
    .dns-block { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.07); }
    .dns-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .dns-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .dns-table th { text-align: left; padding: 4px 12px 4px 0; color: #555; font-weight: 600; }
    .dns-table td { padding: 7px 12px 7px 0; border-top: 1px solid rgba(255,255,255,0.05); }
    .dns-type { color: #93B8FF; font-weight: 700; }
    .dns-host { color: #fff; font-family: monospace; }
    .dns-val  { color: var(--accent); font-family: monospace; word-break: break-all; }
    .dns-ttl  { color: #555; }
    .dns-note { font-size: 12px; color: #888; margin-top: 10px; line-height: 1.5; }
    .domain-active-tag { font-size: 11px; font-weight: 700; background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); padding: 3px 10px; border-radius: 100px; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/" aria-label="Arrowtrack Forge">
    <svg width="40" height="33" viewBox="0 0 120 100" aria-hidden="true">
      <defs>
        <linearGradient id="lgSteel" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#CBD2DB"/><stop offset="0.2" stop-color="#9AA3AF"/>
          <stop offset="0.55" stop-color="#5A6573"/><stop offset="1" stop-color="#333942"/>
        </linearGradient>
        <linearGradient id="lgHammer" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#93B8FF"/><stop offset="1" stop-color="#2D6BE0"/>
        </linearGradient>
      </defs>
      <g transform="rotate(34 60 52)">
        <rect x="56.5" y="14" width="7" height="64" rx="3.5" fill="#54627a" stroke="#0E1116" stroke-width="1.5"/>
        <rect x="44" y="6" width="32" height="18" rx="5" fill="url(#lgHammer)" stroke="#0E1116" stroke-width="1.6"/>
        <rect x="46" y="8.5" width="28" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
      </g>
      <path fill="url(#lgSteel)" stroke="#0E1116" stroke-width="2" stroke-linejoin="round"
        d="M10 50 L37 42 L105 42 L105 55 L88 55 C84 62 79 65 74 69 L74 75 L97 75 L97 88 L25 88 L25 75 L50 75 L50 69 C45 65 40 62 35 55 Z"/>
      <path fill="#ffffff" opacity="0.35" d="M37 42 L105 42 L105 45 L37 45 Z"/>
    </svg>
    <span class="logo-text"><span class="logo-eyebrow">Arrowtrack</span><span class="logo-word">Forge</span></span>
  </a>
  <div class="header-right">
    <span class="greeting" id="greeting"></span>
    <button class="logout" onclick="logout()">Log out</button>
  </div>
</header>

<main>
  <h1 class="page-title">My <span>Projects</span></h1>
  <p class="page-sub">Track your build, review your quote, and manage payments.</p>
  <div id="banner"></div>
  <div id="content"><div class="loading">Loading your projects…</div></div>
</main>

<script>
  const money = n => '$' + (Number(n) || 0).toLocaleString();
  const STAGES = [
    { key: 'new', label: 'Submitted' },
    { key: 'reviewing', label: 'Reviewing' },
    { key: 'approved', label: 'Approved' },
    { key: 'active', label: 'In Build' },
    { key: 'complete', label: 'Delivered' }
  ];

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  function timeline(status) {
    const idx = Math.max(0, STAGES.findIndex(s => s.key === status));
    return `<div class="timeline">${STAGES.map((s, i) => {
      const cls = i < idx ? 'done' : i === idx ? 'current' : '';
      const mark = i < idx ? '✓' : (i + 1);
      return `<div class="tl-step ${cls}"><div class="tl-line"></div><div class="tl-dot">${mark}</div><div class="tl-label">${s.label}</div></div>`;
    }).join('')}</div>`;
  }

  function projectCard(p) {
    const d = p.data || {};
    const platforms = [d.platform_web && 'Web', d.platform_ios && 'iOS', d.platform_android && 'Android'].filter(Boolean);
    const deliverables = [d.del_admin&&'Admin',d.del_payments&&'Payments',d.del_ai&&'AI',d.del_push&&'Push',d.del_email&&'Email',d.del_maps&&'Maps',d.del_analytics&&'Analytics',d.del_cms&&'CMS'].filter(Boolean);
    const screens = d.screens_list || [];
    const depositPaid = p.deposit_paid;
    const balancePaid = p.balance_paid;
    const showBalance = p.balance_due > 0 && !balancePaid && (p.status === 'active' || p.status === 'complete');
    const showDeposit = p.status === 'approved' && !depositPaid && p.quote_deposit > 0;

    // ── Preview panel ─────────────────────────────────────────────
    // Primary signal: file_names (have we generated files?)
    // Secondary: deploy_status (are they live yet?)
    const fileNames = p.file_names || [];
    const isDeployed = (p.deploy_status === 'ready') && !!p.deploy_url;
    const isBuilding = p.deploy_status === 'deploying';
    const ref = p.ref_code;

    // ── Self-serve rebuild state ───────────────────────────────────
    const regen = p.regen_status || '';
    const isRegenerating = regen === 'running' || regen.indexOf('running:') === 0;
    const regenStep = regen.indexOf('running:') === 0 ? regen.split(':')[1] : null;
    const regenError = regen.indexOf('error:') === 0 ? regen.slice(6) : null;
    const canRebuild = !!(p.data && Object.keys(p.data).length > 0);
    const rebuildBtn = isRegenerating
      ? '<button class="rebuild-btn" disabled>↻ Rebuilding' + (regenStep ? ' — step ' + regenStep + '…' : '…') + '</button>'
      : (canRebuild
          ? '<button class="rebuild-btn" onclick="rebuildApp(\'' + ref + '\', this)">↻ Rebuild from my brief</button>'
          : '');
    const rebuildBar = (rebuildBtn || regenError)
      ? '<div class="rebuild-bar">' + rebuildBtn
          + (regenError ? '<span class="rebuild-err">Last rebuild failed: ' + regenError + '</span>' : '')
          + '<span class="rebuild-hint">Re-runs the AI build from your saved answers, then publishes it live.</span>'
          + '</div>'
      : '';

    let previewSection = '';
    if (fileNames.length > 0) {
      // ── Files exist: show tabbed iframe preview ─────────────────
      const hasDomain   = !!(p.custom_domain && p.domain_status);
      const domainActive = p.domain_status === 'active';
      const liveBase    = isDeployed ? (domainActive ? 'https://' + p.custom_domain : p.deploy_url) : null;
      const dnsRows     = (p.domain_dns_records || []).map(function(r) {
        return '<tr><td class="dns-type">' + r.type + '</td><td class="dns-host">' + r.host + '</td><td class="dns-val">' + r.value + '</td><td class="dns-ttl">' + r.ttl + '</td></tr>';
      }).join('');

      // Tab bar — data attrs carry all the info, no inline JS escaping needed
      const tabs = fileNames.map(function(name, i) {
        return '<button class="preview-tab' + (i === 0 ? ' active' : '') + '"'
          + ' data-ref="' + ref + '"'
          + ' data-file="' + name + '"'
          + (liveBase ? ' data-deploy="' + liveBase + '"' : '')
          + ' onclick="handlePreviewTab(this)">'
          + fileLabel(name)
          + '</button>';
      }).join('');

      const domainBadge = domainActive
        ? '<span class="domain-active-tag">✓ Custom Domain Active</span>'
        : (p.domain_status === 'pending_dns'
            ? '<span style="font-size:11px;font-weight:700;background:rgba(251,191,36,0.12);color:#fcd34d;border:1px solid rgba(251,191,36,0.2);padding:3px 10px;border-radius:100px;">⏳ Domain Pending DNS</span>'
            : '');

      const panelTitle = isDeployed
        ? '🚀 Your Live App ' + domainBadge
        : (isBuilding
            ? '⚡ Building — Preview Below'
            : '🔍 Early Preview — Our team is reviewing this build');

      const panelClass = isDeployed ? 'ready' : (isBuilding ? 'building' : 'pending');

      const noteHtml = !isDeployed
        ? '<div class="preview-note">This is a work-in-progress preview. Our team will review and refine before final delivery.</div>'
        : '';

      const urlBar = isDeployed
        ? '<div class="preview-url-bar">'
            + '<a class="live-btn" href="' + liveBase + '" target="_blank">🌐 Open Your App →</a>'
            + (hasDomain && !domainActive ? '<span style="font-size:13px;color:#888;"> Preview: <a href="' + p.deploy_url + '" target="_blank" style="color:#93B8FF;">' + p.deploy_url + '</a></span>' : '')
            + '</div>'
        : '';

      const dnsBlock = (hasDomain && !domainActive && dnsRows)
        ? '<div class="dns-block"><div class="dns-title">DNS Setup — add these records at your domain registrar</div>'
            + '<table class="dns-table"><thead><tr><th>Type</th><th>Host</th><th>Value</th><th>TTL</th></tr></thead><tbody>' + dnsRows + '</tbody></table>'
            + '<p class="dns-note">Add these records at your registrar (GoDaddy, Namecheap, etc.). DNS usually propagates within 5–60 minutes.</p>'
            + '</div>'
        : '';

      previewSection = '<div class="preview-panel ' + panelClass + '">'
        + '<div class="preview-panel-title">' + panelTitle + '</div>'
        + noteHtml
        + '<div class="preview-tabs">' + tabs + '</div>'
        + '<div class="preview-frame-wrap">'
        +   '<iframe id="preview-iframe-' + ref + '" class="preview-iframe" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" onload="iframeLoaded(\'' + ref + '\')"></iframe>'
        +   '<div id="preview-loading-' + ref + '" class="preview-frame-loading">Loading preview…</div>'
        + '</div>'
        + urlBar + dnsBlock + rebuildBar
        + '</div>';

    } else if (isBuilding) {
      // ── No files yet, deploy kicked off ────────────────────────
      previewSection = '<div class="preview-panel building">'
        + '<div class="preview-panel-title">⚡ Building Your App</div>'
        + '<div class="building-body">'
        +   '<div class="building-dots"><span></span><span></span><span></span></div>'
        +   '<div>'
        +     '<div class="building-text">Assembling &amp; deploying…</div>'
        +     '<div class="building-sub">Usually takes 1–3 minutes. This page will refresh automatically once your app is live.</div>'
        +   '</div>'
        + '</div>'
        + rebuildBar
        + '</div>';
    } else {
      // ── Nothing yet ────────────────────────────────────────────
      previewSection = '<div class="preview-panel pending">'
        + '<div class="preview-panel-title">🔍 Your App Preview</div>'
        + '<div class="pending-body">'
        +   '<div class="pending-icon">🎨</div>'
        +   '<div><div class="pending-text">Our team is crafting your custom app</div>'
        +     '<div class="pending-sub">We\'re reviewing your brief and building your first version. You\'ll receive an email the moment your app is ready to preview here.</div>'
        +   '</div>'
        + '</div>'
        + rebuildBar
        + '</div>';
    }

    return `<div class="project">
      <div class="project-head">
        <div>
          <div class="project-name">${d.project_name || p.project_name || 'Untitled Project'}</div>
          <div class="project-ref">${p.ref_code} · started ${new Date(p.created_at).toLocaleDateString()}</div>
        </div>
        <span class="status-badge status-${p.status}">${STAGES.find(s=>s.key===p.status)?.label || p.status}</span>
      </div>

      ${timeline(p.status)}

      ${previewSection}

      <div class="grid">
        <div class="panel">
          <div class="panel-title">Your Quote</div>
          <div class="qrow"><span class="k">Package</span><span class="v">${d.package || '—'}</span></div>
          <div class="qrow"><span class="k">Project Total</span><span class="v">${money(p.quote_total)}</span></div>
          <div class="qrow"><span class="k">Deposit (50%) ${depositPaid ? '<span class="paid-pill">Paid</span>' : ''}</span><span class="v">${money(p.quote_deposit)}</span></div>
          <div class="qrow total"><span class="k">Balance Due ${balancePaid ? '<span class="paid-pill">Paid</span>' : (p.balance_due>0?'<span class="due-pill">Due</span>':'')}</span><span class="v">${money(p.balance_due)}</span></div>
          ${p.quote_monthly > 0 ? `<div class="qrow"><span class="k">Care Plan <span style="font-size:10px;color:#888;">(ongoing)</span></span><span class="v" style="color:var(--accent);">${money(p.quote_monthly)}/mo</span></div>` : ''}
        </div>
        <div class="panel">
          <div class="panel-title">What We're Building</div>
          <div class="qrow"><span class="k">Platforms</span><span class="v">${platforms.join(', ') || '—'}</span></div>
          <div style="margin-top:12px;"><div style="font-size:11px;color:#888;margin-bottom:8px;">COMPONENTS</div>
            <div class="tag-list">${deliverables.map(x=>`<span class="tag">${x}</span>`).join('') || '<span style="color:#555;font-size:13px;">—</span>'}</div></div>
          <div style="margin-top:14px;"><div style="font-size:11px;color:#888;margin-bottom:8px;">SCREENS (${screens.length})</div>
            <div class="tag-list">${screens.slice(0,8).map(s=>`<span class="tag tag-green">${s}</span>`).join('') || '<span style="color:#555;font-size:13px;">—</span>'}${screens.length>8?`<span class="tag">+${screens.length-8} more</span>`:''}</div></div>
        </div>
      </div>

      ${showDeposit ? `<div class="balance-bar">
        <div class="balance-info"><div class="bl">🎉 Approved! Pay your 50% deposit to start the build</div><div class="bv">${money(p.quote_deposit)}</div></div>
        <button class="btn-pay" onclick="payDeposit('${p.ref_code}', this)">Pay Deposit →</button>
      </div>` : ''}
      ${showBalance ? `<div class="balance-bar">
        <div class="balance-info"><div class="bl">Final balance due on delivery</div><div class="bv">${money(p.balance_due)}</div></div>
        <button class="btn-pay" onclick="payBalance('${p.ref_code}', this)">Pay Balance →</button>
      </div>` : ''}
      <div class="pay-note" id="payNote-${p.ref_code}"></div>
    </div>`;
  }

  async function rebuildApp(ref, btn) {
    if (!confirm('Rebuild this app from your saved brief? This re-runs the AI build and republishes it live. It usually takes 2–4 minutes.')) return;
    btn.disabled = true; btn.textContent = '↻ Starting rebuild…';
    try {
      const res = await fetch('/api/my-projects/' + encodeURIComponent(ref) + '/regenerate', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        // Refresh immediately so the card flips to the "Rebuilding…" state, then polling takes over.
        const r = await fetch('/api/my-projects');
        if (r.ok) {
          const updated = await r.json();
          document.getElementById('content').innerHTML = updated.map(projectCard).join('');
          _blobCache = {}; initPreviewTabs(updated); scheduleRefresh(updated);
        }
      } else {
        btn.disabled = false; btn.textContent = '↻ Rebuild from my brief';
        alert(data.error || 'Could not start the rebuild.');
      }
    } catch (err) {
      btn.disabled = false; btn.textContent = '↻ Rebuild from my brief';
      alert('Network error — please try again.');
    }
  }

  async function payBalance(ref, btn) {
    btn.disabled = true; btn.textContent = 'Starting checkout…';
    try {
      const res = await fetch('/api/pay-balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ref_code: ref }) });
      const data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else if (data.demo) { document.getElementById('payNote-' + ref).textContent = '💳 ' + data.message; btn.disabled = false; btn.textContent = 'Pay Balance →'; }
      else { btn.disabled = false; btn.textContent = 'Pay Balance →'; alert('Could not start checkout.'); }
    } catch (err) { btn.disabled = false; btn.textContent = 'Pay Balance →'; alert('Network error.'); }
  }

  async function payDeposit(ref, btn) {
    btn.disabled = true; btn.textContent = 'Starting checkout…';
    try {
      const res = await fetch('/api/pay-deposit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ref_code: ref }) });
      const data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else if (data.demo) { document.getElementById('payNote-' + ref).textContent = '💳 ' + data.message; btn.disabled = false; btn.textContent = 'Pay Deposit →'; }
      else { btn.disabled = false; btn.textContent = 'Pay Deposit →'; alert(data.error || 'Could not start checkout.'); }
    } catch (err) { btn.disabled = false; btn.textContent = 'Pay Deposit →'; alert('Network error.'); }
  }

  // ── Page-preview helpers ──────────────────────────────────────
  // Convert filenames to readable tab labels
  function fileLabel(name) {
    var map = { 'index.html':'Home', 'about.html':'About', 'contact.html':'Contact',
                'terms.html':'Terms & Privacy', 'privacy.html':'Privacy',
                'services.html':'Services', 'pricing.html':'Pricing', 'faq.html':'FAQ',
                'login.html':'Login', 'signup.html':'Sign Up', 'dashboard.html':'Dashboard' };
    return map[name] || name.replace('.html','').replace(/-/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }

  // Blob URL cache: key = ref+':'+filename → blobUrl
  var _blobCache = {};

  function iframeLoaded(ref) {
    var loader = document.getElementById('preview-loading-' + ref);
    if (loader) loader.classList.add('hidden');
  }

  function handlePreviewTab(btn) {
    var ref      = btn.dataset.ref;
    var file     = btn.dataset.file;
    var deployBase = btn.dataset.deploy || '';
    // Mark tab active
    var allTabs = document.querySelectorAll('.preview-tab[data-ref="' + ref + '"]');
    allTabs.forEach(function(t){ t.classList.remove('active'); });
    btn.classList.add('active');
    // Show loading overlay
    var loader = document.getElementById('preview-loading-' + ref);
    if (loader) { loader.textContent = 'Loading preview…'; loader.classList.remove('hidden'); }
    var iframe = document.getElementById('preview-iframe-' + ref);
    if (!iframe) return;
    if (deployBase) {
      // Deployed: load from Netlify directly
      iframe.src = deployBase.replace(/\/$/, '') + '/' + file;
    } else {
      // Pre-deploy: fetch raw file → blob URL
      var cacheKey = ref + ':' + file;
      if (_blobCache[cacheKey]) {
        iframe.src = _blobCache[cacheKey];
        return;
      }
      iframe.src = 'about:blank';
      fetch('/api/my-projects/' + encodeURIComponent(ref) + '/file?name=' + encodeURIComponent(file))
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (!data.content) return;
          var blob = new Blob([data.content], { type: 'text/html' });
          var url  = URL.createObjectURL(blob);
          _blobCache[cacheKey] = url;
          iframe.src = url;
        })
        .catch(function(){ if (loader) { loader.textContent = 'Preview unavailable.'; } });
    }
  }

  // Auto-load the first tab for every project card after render
  function initPreviewTabs(projects) {
    projects.forEach(function(p) {
      var fileNames = p.file_names || [];
      if (!fileNames.length) return;
      var firstTab = document.querySelector('.preview-tab[data-ref="' + p.ref_code + '"]');
      if (firstTab) handlePreviewTab(firstTab);
    });
  }

  // Auto-refresh every 8s while any project is still deploying
  let _refreshTimer = null;
  function scheduleRefresh(projects) {
    if (_refreshTimer) return; // already scheduled
    const anyActive = projects.some(function(p) {
      const rg = p.regen_status || '';
      return p.deploy_status === 'deploying' || rg === 'running' || rg.indexOf('running:') === 0;
    });
    if (!anyActive) return;
    _refreshTimer = setTimeout(async function() {
      _refreshTimer = null;
      try {
        const r = await fetch('/api/my-projects');
        if (!r.ok) return;
        const updated = await r.json();
        document.getElementById('content').innerHTML = updated.map(projectCard).join('');
        _blobCache = {}; // clear blob cache on refresh (new files may have arrived)
        initPreviewTabs(updated);
        scheduleRefresh(updated); // keep polling until all deploys settle
      } catch (e) { /* network blip — try again next cycle */ scheduleRefresh(projects); }
    }, 8000);
  }

  async function load() {
    // Auth check
    const meRes = await fetch('/api/me');
    if (!meRes.ok) { window.location.href = '/login'; return; }
    const me = await meRes.json();
    document.getElementById('greeting').innerHTML = me.name ? `Hi, <b>${me.name.split(' ')[0]}</b>` : me.email;

    if (new URLSearchParams(location.search).get('balance_paid') === '1') {
      document.getElementById('banner').innerHTML = '<div class="banner">🎉 Payment received — thank you! Your balance is now settled.</div>';
    }
    if (new URLSearchParams(location.search).get('deposit_paid') === '1') {
      document.getElementById('banner').innerHTML = '<div class="banner">🎉 Deposit received — thank you! Your build is now in the queue.</div>';
    }

    const res = await fetch('/api/my-projects');
    const projects = await res.json();
    const content = document.getElementById('content');
    if (!projects.length) {
      content.innerHTML = `<div class="empty">No projects yet. <a href="/build">Start your first project →</a></div>`;
      return;
    }
    content.innerHTML = projects.map(projectCard).join('');
    initPreviewTabs(projects);   // auto-load first tab for each project
    scheduleRefresh(projects);   // kick off auto-refresh if anything is deploying
  }

  load();
</script>
</body>
</html>
