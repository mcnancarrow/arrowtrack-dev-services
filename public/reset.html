<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arrowtrack Forge — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 100'%3E%3Cpath fill='%235A6573' stroke='%230E1116' stroke-width='2' stroke-linejoin='round' d='M10 50 L37 42 L105 42 L105 55 L88 55 C84 62 79 65 74 69 L74 75 L97 75 L97 88 L25 88 L25 75 L50 75 L50 69 C45 65 40 62 35 55 Z'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #3B82F6; --brand-dark: #2563EB; --accent: #60A5FA; --dark: #16191F; --dark2: #22272E; --gray: #9AA3AF; --white: #E6E9ED; }
    body { font-family: 'Inter', sans-serif; color: var(--white); min-height: 100vh; display: flex; flex-direction: column;
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(59,130,246,.10), transparent 60%),
        linear-gradient(180deg,#1B1F26 0%,var(--dark) 45%,#0F1217 100%);
      background-attachment: fixed; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .logo svg { display: block; }
    .logo .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo .logo-eyebrow { font: 600 9px/1 'Inter', sans-serif; letter-spacing: .28em; color: var(--gray); text-transform: uppercase; margin-bottom: 4px; }
    .logo .logo-word { font: 800 22px/1 'Saira Condensed', 'Inter', sans-serif; letter-spacing: .04em; color: var(--brand); text-transform: uppercase; }
    .logo span:first-child { color: var(--brand); }
    .logo span:last-child { color: var(--white); }
    .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { width: 100%; max-width: 420px; background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; }
    .eyebrow { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
    h1 span { color: var(--brand); }
    .sub { font-size: 14px; color: var(--gray); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
    .field input { width: 100%; background: var(--dark); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 16px; color: var(--white); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--brand); }
    .btn { width: 100%; background: var(--brand); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
    .btn:hover { background: var(--brand-dark); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; padding: 12px 14px; border-radius: 8px; margin-bottom: 18px; line-height: 1.5; }
    .msg.error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg.success { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: #86efac; }
    footer { text-align: center; padding: 24px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/" aria-label="Arrowtrack Forge">
    <svg width="42" height="35" viewBox="0 0 120 100" aria-hidden="true">
      <defs>
        <linearGradient id="lgSteel" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#CBD2DB"/><stop offset="0.2" stop-color="#9AA3AF"/>
          <stop offset="0.55" stop-color="#5A6573"/><stop offset="1" stop-color="#333942"/>
        </linearGradient>
        <linearGradient id="lgHammer" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#93B8FF"/><stop offset="1" stop-color="#2D6BE0"/>
        </linearGradient>
      </defs>
      <g transform="rotate(34 60 52)">
        <rect x="56.5" y="14" width="7" height="64" rx="3.5" fill="#54627a" stroke="#0E1116" stroke-width="1.5"/>
        <rect x="44" y="6" width="32" height="18" rx="5" fill="url(#lgHammer)" stroke="#0E1116" stroke-width="1.6"/>
        <rect x="46" y="8.5" width="28" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
      </g>
      <path fill="url(#lgSteel)" stroke="#0E1116" stroke-width="2" stroke-linejoin="round"
        d="M10 50 L37 42 L105 42 L105 55 L88 55 C84 62 79 65 74 69 L74 75 L97 75 L97 88 L25 88 L25 75 L50 75 L50 69 C45 65 40 62 35 55 Z"/>
      <path fill="#ffffff" opacity="0.35" d="M37 42 L105 42 L105 45 L37 45 Z"/>
    </svg>
    <span class="logo-text"><span class="logo-eyebrow">Arrowtrack</span><span class="logo-word">Forge</span></span>
  </a>
</header>

<div class="wrap">
  <div class="card">
    <div class="eyebrow">Customer Portal</div>
    <h1>Reset your <span>password.</span></h1>
    <p class="sub">Choose a new password for your account.</p>

    <div id="msgBox" class="msg" style="display:none;"></div>

    <div id="resetForm">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password"/>
      </div>
      <button class="btn" id="resetBtn" onclick="resetPassword()">Set New Password →</button>
    </div>
  </div>
</div>

<footer>Arrowtrack Solutions LLC · Carpinteria, CA</footer>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  const msgBox = document.getElementById('msgBox');

  function showMsg(m, type) {
    msgBox.textContent = m;
    msgBox.className = 'msg ' + type;
    msgBox.style.display = 'block';
  }

  // No token = invalid link
  if (!token) {
    showMsg('Invalid or missing reset link. Please request a new one.', 'error');
    document.getElementById('resetForm').style.display = 'none';
  }

  async function resetPassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    if (!newPassword || newPassword.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    if (newPassword !== confirmPassword) { showMsg('Passwords do not match.', 'error'); return; }
    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: newPassword })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/login?reset=1';
      } else {
        showMsg(data.error || 'Could not reset password. The link may have expired.', 'error');
        btn.disabled = false; btn.textContent = 'Set New Password →';
      }
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Set New Password →';
    }
  }

  document.querySelectorAll('#newPassword, #confirmPassword').forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); }));
</script>
</body>
</html>
